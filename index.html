<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4a6cf7">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>毛掳聵铆聮聢 矛聢聵锚卤掳 矛聽聭矛聢聵</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Malgun Gothic','Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .container{background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.08);padding:32px;width:420px;max-width:95vw}
    h1{font-size:20px;color:#1a1a2e;margin-bottom:4px}
    .subtitle{font-size:13px;color:#888;margin-bottom:24px}
    .field{margin-bottom:16px}
    label{display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:6px}
    label .req{color:#e74c3c}
    input,textarea,select{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;transition:border-color .2s;font-family:inherit}
    input:focus,textarea:focus,select:focus{outline:none;border-color:#4a6cf7}
    textarea{resize:vertical;min-height:60px}
    .btn{width:100%;padding:12px;background:#4a6cf7;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
    .btn:hover{background:#3a5ce5}
    .btn:disabled{background:#aab;cursor:not-allowed}
    .success{text-align:center;padding:40px 20px}
    .success .icon{font-size:48px;margin-bottom:12px}
    .success h2{color:#27ae60;margin-bottom:8px}
    .success p{color:#666;font-size:14px;margin-bottom:20px}
    .btn-reset{background:#eee;color:#333}
    .btn-reset:hover{background:#ddd}
  </style>
</head>
<body>
  <div class="container" id="formSection">
    <h1>毛掳聵铆聮聢 矛聢聵锚卤掳 矛聽聭矛聢聵</h1>
    <p class="subtitle">J2K CX | 矛聻聟毛聽楼 铆聸聞 矛聽聭矛聢聵 毛虏聞铆聤录矛聺聞 毛聢聞毛楼麓毛漏麓 矛聥聹铆聤赂矛聴聬 矛聻聬毛聫聶 锚赂掳毛隆聺毛聬漏毛聥聢毛聥陇</p>
    <form id="pickupForm" onsubmit="submitForm(event)">
      <div class="field">
        <label>锚鲁聽锚掳聺毛陋聟 <span class="req">*</span></label>
        <input type="text" id="customerName" required placeholder="铆聶聧锚赂赂毛聫聶">
      </div>
      <div class="field">
        <label>矛聽聞铆聶聰毛虏聢铆聵赂 <span class="req">*</span></label>
        <input type="tel" id="phone" required placeholder="01012345678">
      </div>
      <div class="field">
        <label>矛拢录矛聠聦 <span class="req">*</span></label>
        <input type="text" id="address" required placeholder="矛聞聹矛職赂矛聥聹 锚掳聲毛聜篓锚碌卢 铆聟聦铆聹陇毛聻聙毛隆聹 123">
      </div>
      <div class="field">
        <label>矛拢录毛卢赂毛虏聢铆聵赂 <span class="req">*</span></label>
        <input type="text" id="orderNumber" required placeholder="ORD-2026-0001">
      </div>
      <div class="field">
        <label>矛聽聞毛聥卢矛聜卢铆聲颅 (矛職聰矛虏颅矛聜卢铆聲颅)</label>
        <textarea id="memo" placeholder="毛露聙矛聻卢矛聥聹 锚虏陆毛鹿聞矛聥陇矛聴聬 毛搂隆锚虏篓矛拢录矛聞赂矛職聰"></textarea>
      </div>
      <div class="field">
        <label>毛掳聵铆聮聢矛聜卢矛聹聽 <span class="req">*</span></label>
        <select id="returnReason" required>
          <option value="">矛聞聽铆聝聺铆聲麓矛拢录矛聞赂矛職聰</option>
          <option value="毛聥篓矛聢聹毛鲁聙矛聥卢">毛聥篓矛聢聹毛鲁聙矛聥卢</option>
          <option value="矛聝聛铆聮聢毛露聢毛聼聣">矛聝聛铆聮聢毛露聢毛聼聣</option>
          <option value="矛聵陇毛掳掳矛聠隆">矛聵陇毛掳掳矛聠隆</option>
          <option value="矛聜卢矛聺麓矛娄聢毛露聢矛聺录矛鹿聵">矛聜卢矛聺麓矛娄聢 毛露聢矛聺录矛鹿聵</option>
          <option value="矛聝聣矛聝聛毛露聢矛聺录矛鹿聵">矛聝聣矛聝聛 毛露聢矛聺录矛鹿聵</option>
          <option value="锚赂掳铆聝聙">锚赂掳铆聝聙</option>
        </select>
      </div>
      <button type="submit" class="btn" id="submitBtn">矛聢聵锚卤掳 矛聽聭矛聢聵铆聲聵锚赂掳</button>
    </form>
  </div>
  <div class="container success" id="successSection" style="display:none">
    <div class="icon">芒聹聟</div>
    <h2>矛聽聭矛聢聵 矛聶聞毛拢聦!</h2>
    <p>毛掳聵铆聮聢 矛聢聵锚卤掳 矛聽聲毛鲁麓锚掳聙 矛聥聹铆聤赂矛聴聬 锚赂掳毛隆聺毛聬聵矛聴聢矛聤碌毛聥聢毛聥陇.</p>
    <button class="btn btn-reset" onclick="resetForm()">矛聝聢毛隆聹矛職麓 矛聽聭矛聢聵铆聲聵锚赂掳</button>
  </div>
  <script>
    const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwBG_uD7D_I6d5QUuhnGPnSlFk-Bv_M_tsLFWctffbEYDb7g_gP9rtdSbS21B5ksFoL/exec";

    if("serviceWorker"in navigator){navigator.serviceWorker.register("./sw.js")}

    function submitForm(e){
      e.preventDefault();
      var btn=document.getElementById("submitBtn");
      btn.disabled=true;btn.textContent="矛聽聭矛聢聵 矛陇聭...";
      var data={
        customerName:document.getElementById("customerName").value,
        phone:document.getElementById("phone").value,
        address:document.getElementById("address").value,
        orderNumber:document.getElementById("orderNumber").value,
        memo:document.getElementById("memo").value,
        returnReason:document.getElementById("returnReason").value
      };
      fetch(SCRIPT_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data),mode:"no-cors"})
      .then(function(){
        document.getElementById("formSection").style.display="none";
        document.getElementById("successSection").style.display="block";
      }).catch(function(err){
        alert("矛聵陇毛楼聵锚掳聙 毛掳聹矛聝聺铆聳聢矛聤碌毛聥聢毛聥陇: "+err.message);
        btn.disabled=false;btn.textContent="矛聢聵锚卤掳 矛聽聭矛聢聵铆聲聵锚赂掳";
      });
    }
    function resetForm(){
      document.getElementById("pickupForm").reset();
      document.getElementById("formSection").style.display="block";
      document.getElementById("successSection").style.display="none";
      document.getElementById("submitBtn").disabled=false;
      document.getElementById("submitBtn").textContent="矛聢聵锚卤掳 矛聽聭矛聢聵铆聲聵锚赂掳";
    }
  </script>
</body>
</html>
